<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PISCES — Underwater World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000c1a;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    canvas { display: block; }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 10, 25, 0.88);
      color: #7ecfff;
      z-index: 10;
    }

    #overlay h1 {
      font-size: 3.5rem;
      letter-spacing: 0.35em;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 30px rgba(100, 200, 255, 0.6);
    }

    #overlay .subtitle {
      font-size: 0.85rem;
      opacity: 0.5;
      letter-spacing: 0.2em;
      margin-bottom: 2.5rem;
    }

    #overlay button {
      background: none;
      border: 1px solid rgba(126, 207, 255, 0.6);
      color: #7ecfff;
      padding: 0.75rem 2.5rem;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.15em;
      transition: background 0.2s, box-shadow 0.2s;
    }

    #overlay button:hover {
      background: rgba(126, 207, 255, 0.12);
      box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
    }

    #controls-hint {
      margin-top: 1.6rem;
      font-size: 0.68rem;
      opacity: 0.4;
      letter-spacing: 0.08em;
      line-height: 1.8;
      text-align: center;
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      pointer-events: none;
      z-index: 5;
      display: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(200, 230, 255, 0.55);
    }

    #crosshair::before {
      left: 50%;
      top: 0;
      width: 1px;
      height: 100%;
      transform: translateX(-50%);
    }

    #crosshair::after {
      top: 50%;
      left: 0;
      height: 1px;
      width: 100%;
      transform: translateY(-50%);
    }

    #hud {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(126, 207, 255, 0.4);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      display: none;
      pointer-events: none;
      white-space: nowrap;
    }

    #depth-meter {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      color: rgba(126, 207, 255, 0.5);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="overlay">
    <h1>PISCES</h1>
    <div class="subtitle">AN UNDERWATER WORLD</div>
    <button id="startBtn">DIVE IN</button>
    <div id="controls-hint">
      W A S D &mdash; Swim &nbsp;&nbsp;|&nbsp;&nbsp; SPACE &mdash; Rise &nbsp;&nbsp;|&nbsp;&nbsp; SHIFT &mdash; Sink<br>
      MOUSE &mdash; Look &nbsp;&nbsp;|&nbsp;&nbsp; ESC &mdash; Pause
    </div>
  </div>

  <div id="crosshair"></div>
  <div id="hud">WASD · SWIM &nbsp;&nbsp;|&nbsp;&nbsp; SPACE · RISE &nbsp;&nbsp;|&nbsp;&nbsp; SHIFT · SINK &nbsp;&nbsp;|&nbsp;&nbsp; ESC · PAUSE</div>
  <div id="depth-meter">DEPTH: <span id="depth-val">0</span>m</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="src/main.js"></script>
</body>
</html>
