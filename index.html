<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PISCES — Underwater World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000c1a;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      touch-action: none;
      overscroll-behavior: none;
    }

    canvas { display: block; }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 10, 25, 0.88);
      color: #7ecfff;
      z-index: 10;
    }

    #overlay h1 {
      font-size: 3.5rem;
      letter-spacing: 0.35em;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 30px rgba(100, 200, 255, 0.6);
    }

    #overlay .subtitle {
      font-size: 0.85rem;
      opacity: 0.5;
      letter-spacing: 0.2em;
      margin-bottom: 2.5rem;
    }

    #overlay button {
      background: none;
      border: 1px solid rgba(126, 207, 255, 0.6);
      color: #7ecfff;
      padding: 0.75rem 2.5rem;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.15em;
      transition: background 0.2s, box-shadow 0.2s;
    }

    #overlay button:hover {
      background: rgba(126, 207, 255, 0.12);
      box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
    }

    #controls-hint {
      margin-top: 1.6rem;
      font-size: 0.68rem;
      opacity: 0.4;
      letter-spacing: 0.08em;
      line-height: 1.8;
      text-align: center;
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      pointer-events: none;
      z-index: 5;
      display: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(200, 230, 255, 0.55);
    }

    #crosshair::before {
      left: 50%;
      top: 0;
      width: 1px;
      height: 100%;
      transform: translateX(-50%);
    }

    #crosshair::after {
      top: 50%;
      left: 0;
      height: 1px;
      width: 100%;
      transform: translateY(-50%);
    }

    #hud {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(126, 207, 255, 0.4);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      display: none;
      pointer-events: none;
      white-space: nowrap;
    }

    #depth-meter {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      color: rgba(126, 207, 255, 0.5);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      display: none;
      pointer-events: none;
    }

    #mobile-controls {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 6;
      pointer-events: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #mobile-controls.is-visible {
      display: block;
    }

    .mobile-stick {
      position: absolute;
      left: 1rem;
      bottom: 1rem;
      width: 8.25rem;
      height: 8.25rem;
      border-radius: 50%;
      border: 1px solid rgba(126, 207, 255, 0.16);
      background: radial-gradient(circle at 50% 50%, rgba(126, 207, 255, 0.11), rgba(0, 8, 20, 0.18) 70%, rgba(0, 8, 20, 0.32));
      box-shadow: 0 0 0 1px rgba(126, 207, 255, 0.05) inset;
      pointer-events: auto;
    }

    .mobile-stick::before {
      content: '';
      position: absolute;
      inset: 22%;
      border-radius: 50%;
      border: 1px dashed rgba(126, 207, 255, 0.12);
    }

    .mobile-thumb {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(126, 207, 255, 0.3), rgba(50, 110, 175, 0.22));
      border: 1px solid rgba(180, 230, 255, 0.38);
      box-shadow: 0 0 24px rgba(70, 150, 220, 0.22);
      transform: translate(-50%, -50%);
    }

    #look-pad {
      position: absolute;
      right: 0;
      bottom: 0;
      width: min(52vw, 22rem);
      height: min(48vh, 18rem);
      pointer-events: auto;
      background: linear-gradient(180deg, rgba(126, 207, 255, 0.02), rgba(126, 207, 255, 0.04));
      border-top-left-radius: 1.1rem;
      border-left: 1px solid rgba(126, 207, 255, 0.08);
      border-top: 1px solid rgba(126, 207, 255, 0.08);
    }

    #look-pad::after {
      content: 'LOOK';
      position: absolute;
      right: 1rem;
      top: 1rem;
      color: rgba(200, 230, 255, 0.28);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
    }

    #mobile-actions {
      position: absolute;
      right: 1rem;
      bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      pointer-events: auto;
    }

    .mobile-action {
      min-width: 5.9rem;
      border: 1px solid rgba(126, 207, 255, 0.26);
      background: rgba(0, 14, 30, 0.58);
      color: #bfeaff;
      padding: 0.9rem 1rem;
      letter-spacing: 0.18em;
      border-radius: 999px;
      font-size: 0.72rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .mobile-action:active,
    .mobile-action.is-pressed {
      background: rgba(126, 207, 255, 0.18);
      box-shadow: 0 0 22px rgba(126, 207, 255, 0.14);
    }

    .mobile-action.sink {
      border-color: rgba(255, 182, 120, 0.26);
      color: #ffe0c0;
    }

    @media (hover: none) and (pointer: coarse) {
      #controls-hint {
        font-size: 0.74rem;
      }

      #overlay h1 {
        font-size: 3rem;
        letter-spacing: 0.28em;
      }
    }
  </style>
</head>
<body>

  <div id="overlay">
    <h1>PISCES</h1>
    <div class="subtitle">AN UNDERWATER WORLD</div>
    <button id="startBtn">DIVE IN</button>
    <div id="controls-hint">
      W A S D &mdash; Swim &nbsp;&nbsp;|&nbsp;&nbsp; SPACE &mdash; Rise &nbsp;&nbsp;|&nbsp;&nbsp; SHIFT &mdash; Sink<br>
      MOUSE &mdash; Look &nbsp;&nbsp;|&nbsp;&nbsp; ESC &mdash; Pause
    </div>
  </div>

  <div id="crosshair"></div>
  <div id="hud">WASD · SWIM &nbsp;&nbsp;|&nbsp;&nbsp; SPACE · RISE &nbsp;&nbsp;|&nbsp;&nbsp; SHIFT · SINK &nbsp;&nbsp;|&nbsp;&nbsp; ESC · PAUSE</div>
  <div id="depth-meter">DEPTH: <span id="depth-val">0</span>m</div>
  <div id="mobile-controls" aria-hidden="true">
    <div id="left-stick" class="mobile-stick">
      <div id="left-thumb" class="mobile-thumb"></div>
    </div>
    <div id="look-pad"></div>
    <div id="mobile-actions">
      <button id="rise-btn" class="mobile-action rise" type="button">RISE</button>
      <button id="sink-btn" class="mobile-action sink" type="button">SINK</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="src/main.js"></script>
</body>
</html>
